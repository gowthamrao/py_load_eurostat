name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-ubuntu:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install PDM
      run: pip install pdm
    - name: Install dependencies
      run: pdm install -d
    - name: Pull Docker images
      run: |
        docker pull postgres:16-alpine
        docker pull testcontainers/ryuk:0.8.1
    - name: List Docker images
      run: docker images
    - name: Run tests
      run: pdm run pytest
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: true

  test-macos:
    needs: test-ubuntu
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up Docker for macOS
      uses: docker/setup-docker-action@v4
    - name: Install PDM
      run: pip install pdm
    - name: Install dependencies
      run: pdm install -d
    - name: Pull Docker images
      run: |
        docker pull postgres:16-alpine
        docker pull testcontainers/ryuk:0.8.1
    - name: List Docker images
      run: docker images
    - name: Run tests
      run: pdm run pytest

  test-windows:
    needs: test-macos
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure Docker for Windows
      run: echo "TESTCONTAINERS_RYUK_DISABLED=true" >> $env:GITHUB_ENV
    - name: Install PDM
      run: pip install pdm
    - name: Install dependencies
      run: pdm install -d
    - name: Pull Docker images
      run: |
        docker pull postgres:16-alpine
        docker pull testcontainers/ryuk:0.8.1
    - name: List Docker images
      run: docker images
    - name: Run tests
      run: pdm run pytest
