name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install PDM
      run: |
        pip install pdm

    - name: Install dependencies
      run: |
        pdm install -d

    - name: Run tests
      run: |
        export PY_LOAD_EUROSTAT_DB__HOST=localhost
        export PY_LOAD_EUROSTAT_DB__PORT=5432
        export PY_LOAD_EUROSTAT_DB__USER=testuser
        export PY_LOAD_EUROSTAT_DB__PASSWORD=testpassword
        export PY_LOAD_EUROSTAT_DB__NAME=testdb
        pdm run pytest
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        # token: ${{ secrets.CODECOV_TOKEN }} # not required for public repos
        file: ./coverage.xml
        fail_ci_if_error: true
