name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Start PostgreSQL
      run: docker compose up -d

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install PDM
      run: |
        pip install pdm

    - name: Install dependencies
      run: |
        pdm install -d

    - name: Run tests
      run: |
        export PY_LOAD_EUROSTAT_DB__HOST=localhost
        export PY_LOAD_EUROSTAT_DB__PORT=5432
        export PY_LOAD_EUROSTAT_DB__USER=testuser
        export PY_LOAD_EUROSTAT_DB__PASSWORD=testpassword
        export PY_LOAD_EUROSTAT_DB__NAME=testdb
        pdm run pytest

    - name: Stop PostgreSQL
      if: always()
      run: docker compose down

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: true

  test-macos:
    runs-on: macos-latest
    needs: test-ubuntu
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Start PostgreSQL
      run: docker compose up -d

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install PDM
      run: |
        pip install pdm

    - name: Install dependencies
      run: |
        pdm install -d

    - name: Run tests
      run: |
        export PY_LOAD_EUROSTAT_DB__HOST=localhost
        export PY_LOAD_EUROSTAT_DB__PORT=5432
        export PY_LOAD_EUROSTAT_DB__USER=testuser
        export PY_LOAD_EUROSTAT_DB__PASSWORD=testpassword
        export PY_LOAD_EUROSTAT_DB__NAME=testdb
        pdm run pytest

    - name: Stop PostgreSQL
      if: always()
      run: docker compose down

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: true

  test-windows:
    runs-on: windows-latest
    needs: test-macos
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Start PostgreSQL
      run: docker compose up -d

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install PDM
      run: |
        pip install pdm

    - name: Install dependencies
      run: |
        pdm install -d

    - name: Run tests
      run: |
        $env:PY_LOAD_EUROSTAT_DB__HOST="localhost"
        $env:PY_LOAD_EUROSTAT_DB__PORT="5432"
        $env:PY_LOAD_EUROSTAT_DB__USER="testuser"
        $env:PY_LOAD_EUROSTAT_DB__PASSWORD="testpassword"
        $env:PY_LOAD_EUROSTAT_DB__NAME="testdb"
        pdm run pytest

    - name: Stop PostgreSQL
      if: always()
      run: docker compose down

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: true
